<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip7Custom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="number"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 14px;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
    }

    input:focus { border-color: #f59e0b; }

    button {
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:active { opacity: 0.8; }

    button.secondary {
      background: #334155;
      color: #f1f5f9;
    }

    button.danger {
      background: #ef4444;
      color: #fff;
    }

    /* Scoreboard */
    .scoreboard-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 300px;
    }

    thead th {
      background: #0f172a;
      padding: 10px 8px;
      text-align: center;
      color: #94a3b8;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    thead th:first-child { text-align: left; }

    tbody tr:nth-child(even) { background: #162032; }

    tbody td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
    }

    tbody td:first-child {
      text-align: left;
      font-weight: 600;
      cursor: default;
    }

    tbody td:last-child { cursor: default; }

    td.editable:hover {
      background: #1e3a5f;
    }

    td.editing {
      padding: 2px 4px;
    }

    td.editing input {
      width: 60px;
      padding: 4px 6px;
      font-size: 0.9rem;
      text-align: center;
    }

    .total-col {
      font-weight: 800;
      font-size: 1rem;
      color: #f59e0b;
    }

    .winner-row td {
      background: #422006 !important;
      color: #fbbf24;
    }

    .winner-badge {
      display: inline-block;
      background: #f59e0b;
      color: #0f172a;
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Round input */
    .round-inputs { display: flex; flex-direction: column; gap: 10px; }

    .round-player-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .round-player-row label {
      flex: 1;
      font-size: 0.95rem;
    }

    .round-player-row input {
      width: 90px;
      flex: none;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .winner-banner {
      display: none;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
      animation: pulse 1s infinite alternate;
    }

    .winner-banner.show { display: block; }

    .winner-banner h2 {
      font-size: 1.5rem;
      color: #0f172a;
      font-weight: 900;
    }

    .winner-banner p {
      color: #0f172a;
      margin-top: 4px;
      font-weight: 600;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.02); }
    }

    .round-label {
      color: #64748b;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 4px;
    }

    .edit-hint {
      color: #475569;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 8px;
    }

    /* Starter banner inside round card */
    .starter-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #0f172a;
      border: 1px solid #f59e0b;
      border-radius: 10px;
      padding: 8px 14px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #f59e0b;
      font-weight: 700;
    }

    .starter-banner span.label {
      color: #94a3b8;
      font-weight: 400;
      font-size: 0.8rem;
    }

    /* Starter badge na lista de jogadores */
    .starter-badge-list {
      display: inline-block;
      background: #f59e0b;
      color: #0f172a;
      border-radius: 5px;
      padding: 1px 6px;
      font-size: 0.65rem;
      font-weight: 800;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Player list item com reordenação */
    .player-item {
      background: #0f172a;
      border-radius: 8px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
    }

    .player-item .pname {
      flex: 1;
      font-size: 0.95rem;
    }

    .player-item .order-btn {
      background: #1e293b;
      color: #94a3b8;
      border: none;
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 700;
      line-height: 1;
    }

    .player-item .order-btn:active { opacity: 0.7; }

    .player-item .remove-btn {
      cursor: pointer;
      color: #ef4444;
      font-weight: bold;
      font-size: 1rem;
      line-height: 1;
    }

    #playerList {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }

    .order-hint {
      color: #475569;
      font-size: 0.75rem;
      margin-top: 6px;
    }

    /* Toast para próximo iniciador */
    .next-starter-toast {
      display: none;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 10px;
      text-align: center;
      font-size: 0.88rem;
      color: #93c5fd;
    }

    .next-starter-toast.show { display: block; }
    .next-starter-toast strong { color: #ffffff; }

    /* Ordem na mesa */
    .table-order-hint {
      color: #475569;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1 style="color: #ffffff;">🃏 Flip7Custom</h1>

  <!-- Winner banner -->
  <div class="winner-banner" id="winnerBanner">
    <h2>🏆 <span id="winnerName"></span> VENCEU!</h2>
    <p id="winnerScore"></p>
  </div>

  <!-- Cadastro de jogadores -->
  <div class="card" id="setupCard">
    <h2>Jogadores</h2>
    <p class="order-hint" style="margin-bottom:8px;">Adicione os jogadores na ordem em que estão sentados na mesa (sentido horário).</p>
    <div class="input-row">
      <input type="text" id="playerName" placeholder="Nome do jogador" maxlength="20" />
      <button onclick="addPlayer()">+</button>
    </div>
    <div id="playerList"></div>
    <p class="order-hint">Use ↑ ↓ para ajustar a ordem dos jogadores na mesa.</p>
    <div class="btn-row">
      <button onclick="startGame()" id="startBtn" style="display:none">Iniciar Jogo</button>
    </div>
  </div>

  <!-- Registrar rodada -->
  <div class="card" id="roundCard" style="display:none">
    <h2>Registrar Rodada</h2>
    <div class="round-label" id="roundLabel">Rodada 1</div>
    <div class="starter-banner" id="starterBanner">
      <span class="label">Inicia a rodada:</span>
      <span id="starterName">—</span>
      🎯
    </div>
    <div class="round-inputs" id="roundInputs"></div>
    <div class="btn-row">
      <button onclick="submitRound()">Confirmar Rodada</button>
      <button class="secondary" onclick="clearRoundInputs()">Limpar</button>
    </div>
    <div class="next-starter-toast" id="nextStarterToast"></div>
  </div>

  <!-- Placar -->
  <div class="card" id="scoreCard" style="display:none">
    <h2>Placar</h2>
    <div class="scoreboard-wrap">
      <table id="scoreTable">
        <thead id="scoreHead"></thead>
        <tbody id="scoreBody"></tbody>
      </table>
    </div>
    <p class="edit-hint">Toque em um valor para editar</p>
    <div class="btn-row" style="margin-top:16px">
      <button class="danger" onclick="resetGame()">Novo Jogo</button>
    </div>
  </div>

  <script>
    let players = [];   // ordem dos jogadores na mesa
    let rounds = [];    // cada rodada: array de pontos por índice de jogador
    let gameStarted = false;
    let starterIndex = 0;  // índice em players de quem inicia a rodada atual
    const WINNING_SCORE = 200;
    const STORAGE_KEY = 'flip7custom_state';

    // ---- Persistence ----

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ players, rounds, gameStarted, starterIndex }));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const state = JSON.parse(raw);
        players = state.players || [];
        rounds = state.rounds || [];
        gameStarted = state.gameStarted || false;
        starterIndex = state.starterIndex ?? 0;
        return true;
      } catch { return false; }
    }

    // ---- Setup ----

    function addPlayer() {
      const input = document.getElementById('playerName');
      const name = input.value.trim();
      if (!name) return;
      if (players.find(p => p.toLowerCase() === name.toLowerCase())) {
        alert('Jogador já cadastrado.');
        return;
      }
      players.push(name);
      input.value = '';
      renderPlayerList();
    }

    document.getElementById('playerName').addEventListener('keydown', e => {
      if (e.key === 'Enter') addPlayer();
    });

    function removePlayer(idx) {
      players.splice(idx, 1);
      renderPlayerList();
    }

    function movePlayer(idx, dir) {
      // dir = -1 (subir) ou +1 (descer)
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= players.length) return;
      [players[idx], players[newIdx]] = [players[newIdx], players[idx]];
      renderPlayerList();
    }

    function renderPlayerList() {
      const list = document.getElementById('playerList');
      list.innerHTML = players.map((p, i) => `
        <div class="player-item">
          <span class="pname">
            <span style="color:#475569;font-size:0.8rem;margin-right:4px;">${i + 1}.</span>
            ${p}
          </span>
          <button class="order-btn" onclick="movePlayer(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
          <button class="order-btn" onclick="movePlayer(${i}, 1)" ${i === players.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
          <span class="remove-btn" onclick="removePlayer(${i})">×</span>
        </div>
      `).join('');
      document.getElementById('startBtn').style.display = players.length >= 2 ? 'inline-block' : 'none';
    }

    function startGame() {
      gameStarted = true;
      starterIndex = 0; // o primeiro da lista começa
      showGameUI();
      saveState();
    }

    function showGameUI() {
      document.getElementById('setupCard').style.display = 'none';
      document.getElementById('roundCard').style.display = 'block';
      document.getElementById('scoreCard').style.display = 'block';
      buildRoundInputs();
      renderScoreboard();
      checkWinner();
    }

    // ---- Starter control ----

    function getStarterName() {
      return players[starterIndex] || '—';
    }

    function advanceStarter() {
      // Próximo iniciador: índice à esquerda de quem iniciou
      // "Esquerdo" numa mesa no sentido horário = índice anterior (circular)
      starterIndex = (starterIndex + 1) % players.length;
    }

    function updateStarterBanner() {
      document.getElementById('starterName').textContent = getStarterName();
    }

    // ---- Rounds ----

    function buildRoundInputs() {
      const container = document.getElementById('roundInputs');
      const roundNum = rounds.length + 1;
      document.getElementById('roundLabel').textContent = `Rodada ${roundNum}`;
      updateStarterBanner();

      // Montar inputs começando pelo iniciador (ordem de jogo)
      const orderedIndices = [];
      for (let i = 0; i < players.length; i++) {
        orderedIndices.push((starterIndex + i) % players.length);
      }

      container.innerHTML = orderedIndices.map((pi, seq) => `
        <div class="round-player-row">
          <label>
            ${seq === 0 ? '🎯 ' : ''}<strong>${players[pi]}</strong>
            ${seq === 0 ? '<span style="color:#f59e0b;font-size:0.75rem;margin-left:4px;">(inicia)</span>' : ''}
          </label>
          <input type="number" id="pts_${pi}" placeholder="pts" min="0" inputmode="numeric" />
        </div>
      `).join('');

      // Hide toast
      document.getElementById('nextStarterToast').classList.remove('show');

      document.getElementById(`pts_${starterIndex}`)?.focus();
    }

    function clearRoundInputs() {
      players.forEach((_, i) => {
        const el = document.getElementById(`pts_${i}`);
        if (el) el.value = '';
      });
      document.getElementById(`pts_${starterIndex}`)?.focus();
    }

    function submitRound() {
      const pts = players.map((_, i) => {
        const el = document.getElementById(`pts_${i}`);
        const val = parseInt(el?.value);
        return isNaN(val) ? 0 : val;
      });
      rounds.push(pts);

      // Calcular próximo iniciador ANTES de avançar (para mostrar no toast)
      const currentStarter = getStarterName();
      advanceStarter();
      const nextStarter = getStarterName();

      saveState();
      renderScoreboard();

      const hasWinner = checkWinner();
      if (!hasWinner) {
        buildRoundInputs();
        // Mostrar toast com próximo iniciador
        const toast = document.getElementById('nextStarterToast');
        toast.innerHTML = `✅ Rodada ${rounds.length} registrada! &nbsp;|&nbsp; Próxima rodada inicia: <strong>${nextStarter}</strong> 🎯`;
        toast.classList.add('show');
      }
    }

    // ---- Inline edit ----

    function startEdit(td, roundIdx, playerIdx) {
      if (td.classList.contains('editing')) return;
      const current = rounds[roundIdx][playerIdx] ?? 0;
      td.classList.add('editing');
      td.innerHTML = `<input type="number" inputmode="numeric" value="${current}" style="width:60px;padding:4px 6px;font-size:0.9rem;text-align:center;" />`;
      const input = td.querySelector('input');
      input.focus();
      input.select();

      function commit() {
        const val = parseInt(input.value);
        rounds[roundIdx][playerIdx] = isNaN(val) ? 0 : val;
        saveState();
        renderScoreboard();
        checkWinner();
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { td.classList.remove('editing'); renderScoreboard(); }
      });
    }

    // ---- Scoreboard ----

    function totals() {
      return players.map((_, pi) => rounds.reduce((sum, r) => sum + (r[pi] || 0), 0));
    }

    function renderScoreboard() {
      const head = document.getElementById('scoreHead');
      const body = document.getElementById('scoreBody');
      const tot = totals();

      head.innerHTML = `<tr>
        <th>Jogador</th>
        ${rounds.map((_, i) => `<th>R${i + 1}</th>`).join('')}
        <th>Total</th>
      </tr>`;

      const sorted = players.map((p, pi) => ({ p, pi })).sort((a, b) => tot[b.pi] - tot[a.pi]);
      body.innerHTML = sorted.map(({ p, pi }) => {
        const isWinner = tot[pi] >= WINNING_SCORE;
        const isCurrentStarter = pi === starterIndex;
        return `<tr class="${isWinner ? 'winner-row' : ''}">
          <td>
            ${p}
            ${isWinner ? '<span class="winner-badge">WIN</span>' : ''}
            ${!isWinner && isCurrentStarter ? '<span style="font-size:0.7rem;margin-left:4px;">🎯</span>' : ''}
          </td>
          ${rounds.map((r, ri) => `<td class="editable" data-round="${ri}" data-player="${pi}">${r[pi] ?? 0}</td>`).join('')}
          <td class="total-col">${tot[pi]}</td>
        </tr>`;
      }).join('');

      body.querySelectorAll('td.editable').forEach(td => {
        td.addEventListener('click', () => {
          startEdit(td, parseInt(td.dataset.round), parseInt(td.dataset.player));
        });
      });
    }

    // Retorna true se houver vencedor
    function checkWinner() {
      const tot = totals();
      const maxScore = Math.max(...tot);
      const banner = document.getElementById('winnerBanner');
      const roundCard = document.getElementById('roundCard');

      if (maxScore >= WINNING_SCORE) {
        // Pode haver mais de um com >= 200; mostra o de maior pontuação (ou o primeiro em caso de empate)
        const winnerIdx = tot.indexOf(maxScore);
        document.getElementById('winnerName').textContent = players[winnerIdx];
        document.getElementById('winnerScore').textContent = `${maxScore} pontos`;
        banner.classList.add('show');
        roundCard.style.display = 'none';
        return true;
      } else {
        banner.classList.remove('show');
        roundCard.style.display = 'block';
        return false;
      }
    }

    // ---- Reset ----

    function resetGame() {
      if (!confirm('Zerar tudo e começar novo jogo?')) return;
      players = [];
      rounds = [];
      gameStarted = false;
      starterIndex = 0;
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById('winnerBanner').classList.remove('show');
      document.getElementById('setupCard').style.display = 'block';
      document.getElementById('roundCard').style.display = 'none';
      document.getElementById('scoreCard').style.display = 'none';
      document.getElementById('playerList').innerHTML = '';
      document.getElementById('startBtn').style.display = 'none';
    }

    // ---- Boot ----

    if (loadState() && gameStarted) {
      showGameUI();
    }
  </script>
</body>
</html>
